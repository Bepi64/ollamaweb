<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Chat avec {{ model }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6fa;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 20px;
        }
        .user-info {
            background: #e6f3ff;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
        .chat-window {
            height: 500px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            background: #f8fafc;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 70%;
            word-wrap: break-word;
        }
        .message.user {
            background: #3182ce;
            color: white;
            margin-left: auto;
            text-align: right;
        }
        .message.model {
            background: #e2e8f0;
            color: #2d3748;
            margin-right: auto;
        }
        .message-input {
            display: flex;
            padding: 15px;
            border-top: 1px solid #e2e8f0;
            background: white;
            border-radius: 0 0 8px 8px;
        }
        .message-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 20px;
            margin-right: 10px;
            font-size: 14px;
        }
        .message-input button {
            padding: 10px 20px;
            background: #3182ce;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .message-input button:hover {
            background: #2563eb;
        }
        .message-input button:disabled {
            background: #a0aec0;
            cursor: not-allowed;
        }
        .typing-indicator {
            color: #718096;
            font-style: italic;
            padding: 10px 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💬 Chat avec {{ model }}</h1>
        </div>
        
        <div class="user-info">
            <strong>Connecté en tant que :</strong> {{ pseudo }}
            <br>
            <small>Modèle : {{ model }}</small>
        </div>
        
        <div class="chat-window">
            <div class="chat-messages" id="chat-messages">
                <div class="message model">
                    <strong>{{ model }} :</strong> Bonjour {{ pseudo }} ! Je suis prêt à discuter avec vous. Que souhaitez-vous me dire ?
                </div>
            </div>
            
            <div class="typing-indicator" id="typing-indicator">
                {{ model }} est en train d'écrire...
            </div>
            
            <div class="message-input">
                <input type="text" id="message-input" placeholder="Tapez votre message..." maxlength="500">
                <button id="send-button" onclick="sendMessage()">Envoyer</button>
            </div>
        </div>
    </div>

    <script>
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const chatMessages = document.getElementById('chat-messages');
        const typingIndicator = document.getElementById('typing-indicator');
        
        // Permettre l'envoi avec Entrée
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            // Désactiver l'input pendant l'envoi
            messageInput.disabled = true;
            sendButton.disabled = true;
            
            // Afficher le message de l'utilisateur
            addMessage(message, 'user');
            messageInput.value = '';
            
            // Afficher l'indicateur de frappe
            typingIndicator.style.display = 'block';
            
            // Simuler la réponse du modèle (à remplacer par un vrai appel API)
            setTimeout(() => {
                typingIndicator.style.display = 'none';
                const response = generateResponse(message);
                addMessage(response, 'model');
                
                // Réactiver l'input
                messageInput.disabled = false;
                sendButton.disabled = false;
                messageInput.focus();
            }, 1000 + Math.random() * 2000); // Délai aléatoire entre 1-3 secondes
        }
        
        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            if (sender === 'user') {
                messageDiv.innerHTML = `<strong>{{ pseudo }} :</strong> ${text}`;
            } else {
                messageDiv.innerHTML = `<strong>{{ model }} :</strong> ${text}`;
            }
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function generateResponse(userMessage) {
            // Réponses simples pour la démo (à remplacer par l'API Ollama)
            const responses = [
                "C'est très intéressant ! Pouvez-vous m'en dire plus ?",
                "Je comprends votre point de vue. Avez-vous d'autres questions ?",
                "Excellente question ! Laissez-moi réfléchir à cela...",
                "C'est un sujet fascinant. Que pensez-vous de...",
                "Merci pour cette information. Comment puis-je vous aider davantage ?"
            ];
            
            return responses[Math.floor(Math.random() * responses.length)];
        }
        
        // Focus automatique sur l'input
        messageInput.focus();
    </script>
</body>
</html>
