<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Choix du modèle Ollama</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6fa;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 500px;
            margin: 60px auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 40px;
        }
        h2 {
            color: #2d3748;
            text-align: center;
        }
        label {
            font-size: 1.1em;
            color: #444;
        }
        select {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            font-size: 1em;
            border-radius: 5px;
            border: 1px solid #cbd5e0;
            background: #f9fafb;
        }
        .btn-valider {
            display: block;
            width: 100%;
            background: #3182ce;
            color: #fff;
            padding: 12px 0;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(49,130,206,0.12);
            transition: background 0.2s;
            border: none;
            margin-top: 30px;
            cursor: pointer;
        }
        .btn-valider:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Choisissez votre modèle Ollama</h2>
        <form method="post">
            {% csrf_token %}
            <label for="model-select">Modèle :</label>
            <select id="model-select" name="model">
                {% for model in models %}
                    <option value="{{ model }}">{{ model }}</option>
                {% empty %}
                    <option disabled>Aucun modèle disponible</option>
                {% endfor %}
            </select>
            <button type="submit" class="btn-valider">Valider</button>
        </form>
